# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación del módulo autoresearch
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Autoresearch

on:
  pull_request:
    paths:
      - "autoresearch/**"
      - "validadores/**"
      - ".github/workflows/validar-autoresearch.yml"
  push:
    branches: [main, master]
    paths:
      - "autoresearch/**"
      - "validadores/**"
  workflow_dispatch:

jobs:
  validar:
    name: Validar plantilla + ejemplo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validar ejemplo (strict)
        run: |
          echo "::group::ejemplo_autoresearch.md"
          python autoresearch/validar_autoresearch.py autoresearch/ejemplo_autoresearch.md --strict
          echo "::endgroup::"

      - name: Validar plantilla (no-strict, placeholders permitidos)
        run: |
          echo "::group::plantilla_autoresearch.md"
          python autoresearch/validar_autoresearch.py autoresearch/plantilla_autoresearch.md || true
          echo "::endgroup::"
