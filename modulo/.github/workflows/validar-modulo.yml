# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación del template de Módulo
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Modulo

on:
  pull_request:
    paths:
      - "modulo/**"
      - ".github/workflows/validar-modulo.yml"
  push:
    branches: [main, master]
    paths:
      - "modulo/**"
  workflow_dispatch:

jobs:
  validar:
    name: Validar modulo/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Ejecutar validador
        run: python modulo/validar_modulo.py modulo/ --strict
