name: Validar agent-config

on:
  push:
    paths:
      - "agent-config/**"
  pull_request:
    paths:
      - "agent-config/**"

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validar estructura y drift
        run: python agent-config/validar_agent_config.py agent-config --strict
