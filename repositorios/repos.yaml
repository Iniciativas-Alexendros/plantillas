# Fuente de verdad · canon de repositorios del operador Alexendros.
# Cualquier modificación debe registrarse en propuesta_#X y bitácora del
# cuaderno alexendros-code-core.
#
# Esquema:
#   <slug>:
#     owner: <github-owner>          # Iniciativas-Alexendros | Alexendros
#     visibility: public | private
#     archived: bool                 # default false
#     default_branch: main           # o el real
#     profile: web-nextjs | mcp-server | library-design-system | dotfiles-config | docs-only
#     license: MIT | Apache-2.0 | AGPL-3.0 | CC-BY-4.0 | PROPRIETARY
#     license_secondary: <SPDX>      # opcional · típicamente CC-BY-4.0 para contenido
#     description: "..."
#     homepage: "..."
#     forgejo_mirror: "..."          # URL del mirror cuando aplique
#     status: tier-1 | tier-2 | tier-3-archived
#     notes: "..."

