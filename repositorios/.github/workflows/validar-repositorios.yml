# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de Repositorios GitHub
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Repositorios GitHub

on:
  pull_request:
    paths:
      - "repositorios/**"
      - ".claude/repositorios/**"
      - "plantillas/repositorios/**"
      - "repositorios/validar_repositorio.py"
      - ".github/workflows/validar-repositorios.yml"
  push:
    branches: [main, master]
    paths:
      - "repositorios/**"
      - ".claude/repositorios/**"
      - "plantillas/repositorios/**"
      - "repositorios/validar_repositorio.py"
  workflow_dispatch:
    inputs:
      repo:
        description: "Directorio específico del repositorio a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir:
    name: Descubrir repos
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: discover
        run: |
          REPOS=()
          for base in "repositorios" ".claude/repositorios"; do
            if [ -d "$base" ]; then
              for dir in "$base"/ejemplo_*; do
                if [ -d "$dir" ] && [ -f "$dir/README.md" ]; then
                  REPOS+=("$dir")
                fi
              done
            fi
          done
          if [ -n "${INPUT_REPO}" ]; then
            REPOS=("${INPUT_REPO}")
          fi
          if [ ${#REPOS[@]} -eq 0 ]; then
            echo 'repos=[]' >> $GITHUB_OUTPUT
            exit 0
          fi
          JSON=$(printf '%s\n' "${REPOS[@]}" | jq -R . | jq -s .)
          echo "repos=$JSON" >> $GITHUB_OUTPUT

  validar:
    name: Validar ${{ matrix.repo }}
    runs-on: ubuntu-latest
    needs: descubrir
    if: ${{ needs.descubrir.outputs.repos != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.descubrir.outputs.repos) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - run: |
          echo "::group::Validando ${ITEM}"
          python repositorios/validar_repositorio.py "${ITEM}" --strict --visibility public
          echo "::endgroup::"
        env:
          ITEM: ${{ matrix.repo }}

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS REPOSITORIOS PASARON"
            exit 0
          else
            echo "❌ ALGUNOS REPOSITORIOS FALLARON"
            exit 1
          fi
