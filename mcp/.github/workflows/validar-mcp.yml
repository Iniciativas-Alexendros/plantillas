# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de MCP Servers
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar MCP Servers

on:
  pull_request:
    paths:
      - "mcp/**"
      - ".claude/mcp/**"
      - "plantillas/mcp/**"
      - "mcp/validar_mcp.py"
      - ".github/workflows/validar-mcp.yml"
  push:
    branches: [main, master]
    paths:
      - "mcp/**"
      - ".claude/mcp/**"
      - "plantillas/mcp/**"
      - "mcp/validar_mcp.py"
  workflow_dispatch:
    inputs:
      server:
        description: "Directorio específico del server a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir:
    name: Descubrir servers
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.discover.outputs.servers }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: discover
        run: |
          SERVERS=()
          for base in "mcp" ".claude/mcp"; do
            if [ -d "$base" ]; then
              for dir in "$base"/*; do
                if [ -d "$dir" ] && ([ -f "$dir/mcp.json" ] || [ -f "$dir/server.py" ] || [ -f "$dir/server.ts" ]); then
                  SERVERS+=("$dir")
                fi
              done
            fi
          done
          if [ -n "${INPUT_SERVER}" ]; then
            SERVERS=("${INPUT_SERVER}")
          fi
          if [ ${#SERVERS[@]} -eq 0 ]; then
            echo 'servers=[]' >> $GITHUB_OUTPUT
            exit 0
          fi
          JSON=$(printf '%s\n' "${SERVERS[@]}" | jq -R . | jq -s .)
          echo "servers=$JSON" >> $GITHUB_OUTPUT

  validar:
    name: Validar ${{ matrix.server }}
    runs-on: ubuntu-latest
    needs: descubrir
    if: ${{ needs.descubrir.outputs.servers != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.descubrir.outputs.servers) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - run: |
        env:
          ITEM: ${{ matrix.server }}
          echo "::group::Validando ${ITEM}"
          python mcp/validar_mcp.py "${ITEM}" --strict
          echo "::endgroup::"

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS MCP SERVERS PASARON"
            exit 0
          else
            echo "❌ ALGUNOS MCP SERVERS FALLARON"
            exit 1
          fi
