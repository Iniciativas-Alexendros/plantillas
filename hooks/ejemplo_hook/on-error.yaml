hook: on_error
description: >
  Intercepta errores del agente y decide si escalar,
  reintentar, o notificar al usuario.

triggers:
  - condition: always
    action: audit_and_confirm

rules:
  error_classification:
    retryable:
      - "ECONNREFUSED"
      - "ETIMEDOUT"
      - "rate limit"
      - "500 Internal Server Error"
      - "502 Bad Gateway"
      - "503 Service Unavailable"
    permission_denied:
      - "EACCES"
      - "EPERM"
      - "Permission denied"
    not_found:
      - "ENOENT"
      - "404 Not Found"
    fatal:
      - "disk full"
      - "out of memory"
      - "segmentation fault"

  actions:
    retryable:
      action: retry
      max_retries: 3
      backoff: exponential
      base_delay_ms: 1000

    permission_denied:
      action: block_and_escalate
      notify: "Permiso denegado — posible problema de configuración"

    not_found:
      action: confirm
      message: "Recurso no encontrado. ¿Crear o usar alternativa?"

    fatal:
      action: block_and_escalate
      notify: "Error fatal del sistema — requiere intervención humana"

  audit_log:
    enabled: true
    destination: ".claude/logs/error-audit.jsonl"
    fields:
      - timestamp
      - error_type
      - error_message
      - tool
      - decision
      - retry_count
