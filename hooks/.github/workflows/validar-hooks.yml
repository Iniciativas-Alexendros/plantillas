# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de Hooks Claude Code
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Hooks Claude Code

on:
  pull_request:
    paths:
      - "hooks/**"
      - ".claude/hooks/**"
      - "plantillas/hooks/**"
      - "hooks/validar_hook.py"
      - ".github/workflows/validar-hooks.yml"
  push:
    branches: [main, master]
    paths:
      - "hooks/**"
      - ".claude/hooks/**"
      - "plantillas/hooks/**"
      - "hooks/validar_hook.py"
  workflow_dispatch:
    inputs:
      hook:
        description: "Directorio específico del hook a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir:
    name: Descubrir hooks
    runs-on: ubuntu-latest
    outputs:
      hooks: ${{ steps.discover.outputs.hooks }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: discover
        run: |
          HOOKS=()
          for base in "hooks" ".claude/hooks"; do
            if [ -d "$base" ]; then
              for dir in "$base"/*; do
                if [ -d "$dir" ] && ([ -f "$dir/HOOK.md" ] || [ -n "$(ls "$dir"/*.yaml "$dir"/*.yml 2>/dev/null)" ]); then
                  HOOKS+=("$dir")
                fi
              done
            fi
          done
          if [ -n "${INPUT_HOOK}" ]; then
            HOOKS=("${INPUT_HOOK}")
          fi
          if [ ${#HOOKS[@]} -eq 0 ]; then
            echo 'hooks=[]' >> $GITHUB_OUTPUT
            exit 0
          fi
          JSON=$(printf '%s\n' "${HOOKS[@]}" | jq -R . | jq -s .)
          echo "hooks=$JSON" >> $GITHUB_OUTPUT

  validar:
    name: Validar ${{ matrix.hook }}
    runs-on: ubuntu-latest
    needs: descubrir
    if: ${{ needs.descubrir.outputs.hooks != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        hook: ${{ fromJson(needs.descubrir.outputs.hooks) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - run: |
          echo "::group::Validando ${ITEM}"
          python hooks/validar_hook.py "${ITEM}" --strict
          echo "::endgroup::"
        env:
          ITEM: ${{ matrix.hook }}

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS HOOKS PASARON"
            exit 0
          else
            echo "❌ ALGUNOS HOOKS FALLARON"
            exit 1
          fi
