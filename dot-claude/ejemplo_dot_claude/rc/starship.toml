# ~/.config/starship.toml — XEK theme (cross-shell bash/zsh)
# Parte del bootstrap XEK-ENV v3.1.
add_newline = true
command_timeout = 1000

format = """
[╭─](bold green)$directory$git_branch$git_status$python$nodejs$rust$golang$docker_context$cmd_duration
[╰─](bold green)$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol   = "[✗](bold red)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "bold cyan"
read_only         = " 🔒"

[git_branch]
symbol = " "
style  = "bold yellow"

[git_status]
style    = "bold red"
modified = "✱"
ahead    = "⇡${count}"
behind   = "⇣${count}"

[python]
symbol = "🐍 "
style  = "bold yellow"
format = "via [$symbol($version )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = "⬢ "
style  = "bold green"

[rust]
symbol = "🦀 "

[golang]
symbol = "🐹 "

[docker_context]
symbol = "🐳 "
only_with_files = true

[cmd_duration]
min_time = 500
format   = "took [$duration]($style) "
style    = "bold yellow"
