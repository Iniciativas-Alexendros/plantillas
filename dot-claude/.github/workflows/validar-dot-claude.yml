# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de configuraciones .claude/
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Configuración .claude/

on:
  pull_request:
    paths:
      - "dot-claude/**"
      - ".claude/**"
      - "plantillas/dot-claude/**"
      - "dot-claude/validar_dot_claude.py"
      - ".github/workflows/validar-dot-claude.yml"
  push:
    branches: [main, master]
    paths:
      - "dot-claude/**"
      - ".claude/**"
      - "plantillas/dot-claude/**"
      - "dot-claude/validar_dot_claude.py"
  workflow_dispatch:
    inputs:
      config:
        description: "Directorio específico de la configuración a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir:
    name: Descubrir configs
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          CONFIGS=()
          for base in "dot-claude" ".claude"; do
            if [ -d "$base" ] && [ -f "$base/CLAUDE.md" ]; then
              CONFIGS+=("$base")
            fi
          done
          if [ -n "${{ github.event.inputs.config }}" ]; then
            CONFIGS=("${{ github.event.inputs.config }}")
          fi
          if [ ${#CONFIGS[@]} -eq 0 ]; then
            echo 'configs=[]' >> $GITHUB_OUTPUT
            exit 0
          fi
          JSON=$(printf '%s\n' "${CONFIGS[@]}" | jq -R . | jq -s .)
          echo "configs=$JSON" >> $GITHUB_OUTPUT

  validar:
    name: Validar ${{ matrix.config }}
    runs-on: ubuntu-latest
    needs: descubrir
    if: ${{ needs.descubrir.outputs.configs != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.descubrir.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - run: |
          echo "::group::Validando ${{ matrix.config }}"
          python dot-claude/validar_dot_claude.py "${{ matrix.config }}" --strict
          echo "::endgroup::"

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODAS LAS CONFIGURACIONES PASARON"
            exit 0
          else
            echo "❌ ALGUNAS CONFIGURACIONES FALLARON"
            exit 1
          fi
