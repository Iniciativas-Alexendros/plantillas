# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de Plugins Claude Code
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Plugins Claude Code

on:
  pull_request:
    paths:
      - "plugins/**"
      - ".claude/plugins/**"
      - "plantillas/plugins/**"
      - "plugins/validar_plugin.py"
      - ".github/workflows/validar-plugins.yml"
  push:
    branches: [main, master]
    paths:
      - "plugins/**"
      - ".claude/plugins/**"
      - "plantillas/plugins/**"
      - "plugins/validar_plugin.py"
  workflow_dispatch:
    inputs:
      plugin:
        description: "Directorio específico del plugin a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir:
    name: Descubrir plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: discover
        run: |
          PLUGINS=()
          for base in "plugins" ".claude/plugins"; do
            if [ -d "$base" ]; then
              for dir in "$base"/*; do
                if [ -d "$dir" ] && [ -f "$dir/plugin.json" ]; then
                  PLUGINS+=("$dir")
                fi
              done
            fi
          done
          if [ -n "${INPUT_PLUGIN}" ]; then
            PLUGINS=("${INPUT_PLUGIN}")
          fi
          if [ ${#PLUGINS[@]} -eq 0 ]; then
            echo 'plugins=[]' >> $GITHUB_OUTPUT
            exit 0
          fi
          JSON=$(printf '%s\n' "${PLUGINS[@]}" | jq -R . | jq -s .)
          echo "plugins=$JSON" >> $GITHUB_OUTPUT

  validar:
    name: Validar ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    needs: descubrir
    if: ${{ needs.descubrir.outputs.plugins != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.descubrir.outputs.plugins) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - run: |
        env:
          ITEM: ${{ matrix.plugin }}
          echo "::group::Validando ${ITEM}"
          python plugins/validar_plugin.py "${ITEM}" --strict
          echo "::endgroup::"

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS PLUGINS PASARON"
            exit 0
          else
            echo "❌ ALGUNOS PLUGINS FALLARON"
            exit 1
          fi
