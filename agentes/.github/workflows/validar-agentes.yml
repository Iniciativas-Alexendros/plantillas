# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación de Agentes Claude Code
#
# Propósito: Verifica que todos los agentes en el repositorio cumplan con
# la estructura, formato, y calidad definidos por el sistema de plantillas.
#
# Se ejecuta en:
#   - Cada Pull Request que modifique agentes/
#   - Push a main/master
#   - Manualmente (workflow_dispatch)
#
# Referencia:
#   - validar_agente.py: Script de validación principal
#   - PLAYBOOK_INICIO.md: Guía del sistema de plantillas
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Agentes Claude Code

on:
  pull_request:
    paths:
      - "agentes/**"
      - ".claude/agents/**"
      - "plantillas/agentes/**"
      - "agentes/validar_agente.py"
      - ".github/workflows/validar-agentes.yml"
  push:
    branches: [main, master]
    paths:
      - "agentes/**"
      - ".claude/agents/**"
      - "plantillas/agentes/**"
      - "agentes/validar_agente.py"
  workflow_dispatch:
    inputs:
      agente:
        description: "Directorio específico del agente a validar (opcional)"
        required: false
        default: ""

jobs:
  descubrir-agentes:
    name: Descubrir agentes
    runs-on: ubuntu-latest
    outputs:
      agentes: ${{ steps.discover.outputs.agentes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Descubrir directorios de agentes
        id: discover
        env:
          INPUT_AGENTE: ${{ github.event.inputs.agente }}
        run: |
          # Buscar agentes en múltiples ubicaciones posibles
          AGENTES=()

          for base in "agentes" ".claude/agents"; do
            if [ -d "$base" ]; then
              for dir in "$base"/*; do
                if [ -d "$dir" ] && [ -f "$dir/AGENT.md" ]; then
                  AGENTES+=("$dir")
                fi
              done
            fi
          done

          # Si se especificó un agente manualmente, validar solo ese
          if [ -n "${INPUT_AGENTE}" ]; then
            AGENTES=("${INPUT_AGENTE}")
          fi

          if [ ${#AGENTES[@]} -eq 0 ]; then
            echo "⚠️ No se encontraron agentes para validar"
            echo 'agentes=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          # Convertir a JSON array para la matrix
          JSON=$(printf '%s\n' "${AGENTES[@]}" | jq -R . | jq -s .)
          echo "agentes=$JSON" >> $GITHUB_OUTPUT
          echo "📁 Agentes descubiertos:"
          printf '%s\n' "${AGENTES[@]}"

  validar:
    name: Validar ${{ matrix.agente }}
    runs-on: ubuntu-latest
    needs: descubrir-agentes
    if: ${{ needs.descubrir-agentes.outputs.agentes != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        agente: ${{ fromJson(needs.descubrir-agentes.outputs.agentes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Ejecutar validador
        env:
          ITEM: ${{ matrix.agente }}
        id: validator
        run: |
          echo "::group::Validando ${ITEM}"
          python validar_agente.py "${ITEM}" --strict
          EXIT_CODE=$?
          echo "::endgroup::"
          exit $EXIT_CODE

      - name: Reportar resultado en PR
        if: github.event_name == 'pull_request' && failure()
        env:
          ITEM: ${{ matrix.agente }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const agente = '${ITEM}';
            const body = `❌ **Validación fallida** para \`${agente}\`

            El agente no cumple con uno o más criterios del sistema de plantillas.

            **Pasos para corregir:**
            1. Ejecuta localmente: \`python validar_agente.py ${agente} --strict\`
            2. Corrige los errores reportados.
            3. Revisa la guía: \`PLAYBOOK_INICIO.md\`

            ---
            *Workflow: \`.github/workflows/validar-agentes.yml\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  resumen:
    name: Resumen de validación
    runs-on: ubuntu-latest
    needs: [descubrir-agentes, validar]
    if: always()
    steps:
      - name: Resultado final
        run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS AGENTES PASARON LA VALIDACIÓN"
            exit 0
          else
            echo "❌ ALGUNOS AGENTES FALLARON LA VALIDACIÓN"
            exit 1
          fi
