agent:
  mode: restricted

  allowed_tools:
    - Read
    - Grep
    - Glob
    - Edit
    - Write
    - Bash
    - Agent
    - TodoWrite

  denied_tools:
    - ShellTool

  bash:
    allowlist:
      - "^git (status|log|diff|branch|show|grep)"
      - "^npm (test|run|install|ci)"
      - "^pnpm (test|run|install|exec)"
      - "^node --version"
      - "^python[0-9]* -m pytest"
      - "^cargo (test|check|build)"

    denylist:
      - "sudo\\s"
      - "rm -rf /"
      - ":(){ :|:& };:"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*sh"
      - "> /etc/"
      - "mkfs\\."
      - "dd if="

    require_confirmation:
      - "git push"
      - "git reset --hard"
      - "git clean -fd"
      - "docker .*(rm|stop|kill)"
      - "npm publish"
      - "rm -rf"

  filesystem:
    allowed_paths:
      - "${PROJECT_ROOT}"
      - "${HOME}/.claude/"

    denied_paths:
      - "/etc/"
      - "/usr/local/bin/"
      - "${HOME}/.ssh/"
      - "${HOME}/.gnupg/"
      - ".env.production"
      - "*.pem"
      - "*.key"

  git:
    auto_commit: false
    require_branch_protection: true
    protected_branches:
      - main
      - master
      - production

  mcp:
    allowed_servers:
      - filesystem
      - git
      - github

    tool_timeout_seconds: 30
    max_result_size_tokens: 10000

subagents:
  inherit_permissions: false
  max_concurrent: 6
  default_model: haiku
