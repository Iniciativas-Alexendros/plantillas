# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación del módulo miniapps
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Miniapps

on:
  pull_request:
    paths:
      - "miniapps/**"
      - "validadores/**"
      - ".github/workflows/validar-miniapps.yml"
  push:
    branches: [main, master]
    paths:
      - "miniapps/**"
      - "validadores/**"
  workflow_dispatch:

jobs:
  validar:
    name: Validar plantilla + ejemplo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validar ejemplo (strict)
        run: |
          echo "::group::ejemplo_miniapps.md"
          python miniapps/validar_miniapps.py miniapps/ejemplo_miniapps.md --strict
          echo "::endgroup::"

      - name: Validar plantilla (no-strict, placeholders permitidos)
        run: |
          echo "::group::plantilla_miniapps.md"
          python miniapps/validar_miniapps.py miniapps/plantilla_miniapps.md || true
          echo "::endgroup::"
