# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación del template de Proyecto
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Proyecto

on:
  pull_request:
    paths:
      - "proyecto/**"
      - ".github/workflows/validar-proyecto.yml"
  push:
    branches: [main, master]
    paths:
      - "proyecto/**"
  workflow_dispatch:

jobs:
  validar:
    name: Validar proyecto/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Ejecutar validador
        run: python proyecto/validar_proyecto.py proyecto/ --strict
