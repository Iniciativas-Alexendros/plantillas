# ═══════════════════════════════════════════════════════════════════════════════
# job-summary · Composite action
#
# Propósito: escribir un resumen estructurado en $GITHUB_STEP_SUMMARY al final
# del job, sin requerir tokens ni red. Markdown rico, agrupable, scrolleable
# desde la página del run.
#
# Uso (mismo repo):
#   - uses: ./.github/actions/job-summary
#     with:
#       title: "Validación de módulos"
#       status: "${{ job.status }}"
#       items: |
#         agentes=ok=12 archivos
#         skills=ok=8 archivos
#         hooks=warn=1 lint warning
#       artifacts: "playwright-report,coverage"
#       duration: "${{ steps.timer.outputs.elapsed }}"
#
# Uso (cross-repo):
#   - uses: Alexendros/plantillas/.github/actions/job-summary@main
# ═══════════════════════════════════════════════════════════════════════════════

name: job-summary
description: Escribe un job summary Markdown rico en $GITHUB_STEP_SUMMARY.

inputs:
  title:
    description: Título del bloque (H2).
    required: true
  status:
    description: "Estado global: success | failure | cancelled | skipped."
    required: false
    default: success
  items:
    description: |
      Lista multilínea "clave=estado=detalle" (estados: ok | warn | fail | info).
      Cada línea se renderiza como fila de tabla con icono.
    required: false
    default: ""
  artifacts:
    description: Lista separada por comas de nombres de artifacts publicados.
    required: false
    default: ""
  duration:
    description: Duración legible (ej. "1m 42s"). Si vacío, se omite.
    required: false
    default: ""
  notes:
    description: Notas libres en Markdown (renderizadas tras la tabla).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Render summary
      shell: bash
      # Todos los valores dinámicos (inputs + contexto github) se pasan por `env:`,
      # NUNCA interpolados con ${{ }} dentro de `run:`. Interpolar directamente en el
      # script hacía que un input con backticks (p.ej. notes con `latest`) se evaluara
      # como command substitution de bash → `latest: command not found` (exit 127) y,
      # peor, abría la puerta a command injection. Por env, bash los lee como datos.
      env:
        IN_TITLE: ${{ inputs.title }}
        IN_STATUS: ${{ inputs.status }}
        IN_ITEMS: ${{ inputs.items }}
        IN_ARTIFACTS: ${{ inputs.artifacts }}
        IN_DURATION: ${{ inputs.duration }}
        IN_NOTES: ${{ inputs.notes }}
        GH_WORKFLOW: ${{ github.workflow }}
        GH_RUN_NUMBER: ${{ github.run_number }}
        GH_SERVER_URL: ${{ github.server_url }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_RUN_ID: ${{ github.run_id }}
        GH_SHA: ${{ github.sha }}
        GH_REF_NAME: ${{ github.ref_name }}
      run: |
        set -Eeuo pipefail
        TITLE="$IN_TITLE"
        STATUS="$IN_STATUS"
        ITEMS="$IN_ITEMS"
        ARTIFACTS="$IN_ARTIFACTS"
        DURATION="$IN_DURATION"
        NOTES="$IN_NOTES"

        case "$STATUS" in
          success)   ICON="🟢" ;;
          failure)   ICON="🔴" ;;
          cancelled) ICON="🟡" ;;
          skipped)   ICON="⚪" ;;
          *)         ICON="ℹ️" ;;
        esac

        {
          echo "## $ICON $TITLE"
          echo ""
          [ -n "$DURATION" ] && echo "**Duración:** \`$DURATION\`  "
          echo "**Workflow:** \`$GH_WORKFLOW\` · **Run:** [#$GH_RUN_NUMBER]($GH_SERVER_URL/$GH_REPOSITORY/actions/runs/$GH_RUN_ID)  "
          echo "**Commit:** \`$GH_SHA\` ($GH_REF_NAME)"
          echo ""

          if [ -n "$ITEMS" ]; then
            echo "| Comprobación | Estado | Detalle |"
            echo "|---|---|---|"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              key="${line%%=*}"
              rest="${line#*=}"
              state="${rest%%=*}"
              detail="${rest#*=}"
              case "$state" in
                ok)   se="✅ ok" ;;
                warn) se="⚠️ warn" ;;
                fail) se="❌ fail" ;;
                info) se="ℹ️ info" ;;
                *)    se="$state" ;;
              esac
              echo "| \`$key\` | $se | $detail |"
            done <<< "$ITEMS"
            echo ""
          fi

          if [ -n "$ARTIFACTS" ]; then
            echo "**Artifacts publicados:** $(echo "$ARTIFACTS" | sed 's/,/, /g')"
            echo ""
          fi

          if [ -n "$NOTES" ]; then
            echo "---"
            echo ""
            echo "$NOTES"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
