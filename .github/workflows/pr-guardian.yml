# ═══════════════════════════════════════════════════════════════════════════════
# PR Guardian · Control de calidad de Pull Requests
#
# Propósito: Evitar que PRs con títulos incorrectos, tamaño excesivo,
# modificaciones a archivos protegidos, o sin CHANGELOG entren al repo.
#
# Se ejecuta en:
#   - Cada Pull Request (opened, synchronize, reopened, edited)
# ═══════════════════════════════════════════════════════════════════════════════

name: PR Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  conventional-title:
    name: Título Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - name: Validar título del PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          REGEX="^(feat|fix|docs|style|refactor|test|ci|chore)(\(.+\))?!?: .+"

          if echo "$PR_TITLE" | grep -qE "$REGEX"; then
            echo "✅ Título válido: $PR_TITLE"
            exit 0
          else
            echo "❌ Título inválido: $PR_TITLE"
            echo ""
            echo "El título debe seguir Conventional Commits:"
            echo "  tipo(alcance)?: descripción"
            echo ""
            echo "Tipos permitidos: feat, fix, docs, style, refactor, test, ci, chore"
            echo "Ejemplo: feat(agentes): añade validador de subagentes"
            exit 1
          fi

  pr-size:
    name: Tamaño del PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Contar líneas cambiadas
        run: |
          LINES=$(git diff --numstat "origin/${{ github.event.pull_request.base.ref }}" \
            "${{ github.event.pull_request.head.sha }}" | \
            awk '{added+=$1; removed+=$2} END {print added+removed}')

          echo "📊 Líneas cambiadas: $LINES"

          if [ "$LINES" -gt 500 ]; then
            echo "⚠️ PR muy grande ($LINES líneas). Considera dividirlo en PRs menores."
            exit 1
          else
            echo "✅ Tamaño aceptable"
          fi

  protected-files:
    name: Archivos Protegidos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detectar archivos protegidos modificados
        run: |
          PROTECTED=(
            "INDEX.md"
            "README.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "ROADMAP.md"
            "CHANGELOG.md"
            "INTEGRACION.md"
            "install.sh"
            "claude-init"
            "update.sh"
            "validadores/base.py"
            ".pre-commit-config.yaml"
          )

          EXIT=0
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}" \
            "${{ github.event.pull_request.head.sha }}")

          # CHANGELOG.md is allowed when module directories are also changed
          HAS_MODULE_CHANGES=false
          for mod in agentes skills commands hooks mcp plugins dot-claude repositorios modulo proyecto validadores; do
            if echo "$CHANGED" | grep -q "^${mod}/"; then
              HAS_MODULE_CHANGES=true
              break
            fi
          done

          for f in "${PROTECTED[@]}"; do
            if [ "$f" = "CHANGELOG.md" ] && [ "$HAS_MODULE_CHANGES" = true ]; then
              continue
            fi
            if echo "$CHANGED" | grep -qx "$f"; then
              echo "⚠️ Archivo protegido modificado: $f"
              EXIT=1
            fi
          done

          if [ $EXIT -eq 1 ]; then
            echo ""
            echo "Estos archivos definen el contrato del sistema de plantillas."
            echo "Si necesitas modificarlos, abre un issue primero y discútelo."
            exit 1
          fi

  changelog-check:
    name: CHANGELOG Actualizado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar CHANGELOG.md
        run: |
          CHANGES=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}" \
            "${{ github.event.pull_request.head.sha }}")

          if echo "$CHANGES" | grep -qE '^(agentes|skills|commands|hooks|mcp|plugins|dot-claude|repositorios|validadores|modulo|proyecto)/'; then
            if echo "$CHANGES" | grep -qx "CHANGELOG.md"; then
              echo "✅ CHANGELOG.md actualizado"
              exit 0
            else
              echo "❌ Falta actualizar CHANGELOG.md"
              echo "Este PR modifica módulos o validadores. Añade una entrada en CHANGELOG.md."
              exit 1
            fi
          else
            echo "ℹ️ No requiere CHANGELOG (no modifica módulos)"
          fi

  placeholder-check:
    name: Placeholders en Ejemplos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install pyyaml
      - name: Validar que ejemplos no tengan placeholders
        run: |
          source .github/scripts/module-map.sh
          EXIT=0
          for dir in "${MODULOS_CANONICOS[@]}"; do
            if module_is_special "$dir"; then
              continue
            fi
            ejemplo=$(module_ejemplo "$dir")
            script=$(module_validator "$dir")

            if [ -d "$ejemplo" ] && [ -f "$script" ]; then
              python "$script" "$ejemplo" --strict || EXIT=1
            fi
          done
          exit $EXIT
