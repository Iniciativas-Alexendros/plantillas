# ═══════════════════════════════════════════════════════════════════════════════
# Guardián de PRs · Control de calidad de Pull Requests
#
# Propósito: Evitar que PRs con títulos incorrectos, tamaño excesivo,
# modificaciones a archivos protegidos, o sin CHANGELOG entren al repo.
#
# Se ejecuta en:
#   - Cada Pull Request (eventos GitHub: opened, synchronize, reopened, edited)
# ═══════════════════════════════════════════════════════════════════════════════

name: Guardián de PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  guardian:
    name: Guardián de PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pyyaml

      # ── 1. Título Conventional Commit ────────────────────────────────────
      - name: Validar título del PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "::group::Título Conventional Commit"
          REGEX="^(feat|fix|docs|style|refactor|test|ci|chore)(\(.+\))?!?: .+"

          if echo "$PR_TITLE" | grep -qE "$REGEX"; then
            echo "✅ Título válido: $PR_TITLE"
          else
            echo "❌ Título inválido: $PR_TITLE"
            echo ""
            echo "El título debe seguir Conventional Commits:"
            echo "  tipo(alcance)?: descripción"
            echo ""
            echo "Tipos permitidos: feat, fix, docs, style, refactor, test, ci, chore"
            echo "Ejemplo: feat(agentes): añade validador de subagentes"
            exit 1
          fi
          echo "::endgroup::"

      # ── 2. Tamaño del PR (advisory — no bloquea otros checks) ─────────
      - name: Contar líneas cambiadas
        id: pr_size
        continue-on-error: true
        run: |
          echo "::group::Tamaño del PR"
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE=$(git merge-base "$BASE_REF" "$HEAD_SHA")
          LINES=$(git diff --numstat "$BASE" "$HEAD_SHA" | \
            awk '{added+=$1; removed+=$2} END {print added+removed}')

          echo "📊 Líneas cambiadas: $LINES"

          if [ "$LINES" -gt 800 ]; then
            echo "⚠️ PR muy grande ($LINES líneas). Considera dividirlo en PRs menores."
            exit 1
          else
            echo "✅ Tamaño aceptable"
          fi
          echo "::endgroup::"

      # ── 3. Archivos Protegidos ──────────────────────────────────────────
      - name: Detectar archivos protegidos modificados
        run: |
          echo "::group::Archivos protegidos"
          PROTECTED=(
            "INDEX.md"
            "README.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "ROADMAP.md"
            "INTEGRACION.md"
            "claude-init"
            "update.sh"
            "validadores/base.py"
          )
          # Nota: install.sh y .pre-commit-config.yaml NO son protegidos
          # bloqueantes — son configuración operativa y deben poder
          # modificarse en PRs de lint/CI sin issue previo.

          EXIT=0
          CHANGED=$(git diff --name-only "$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" "${{ github.event.pull_request.head.sha }}")" \
            "${{ github.event.pull_request.head.sha }}")

          # CHANGELOG.md: protegido SOLO si no hay cambios en módulos
          # (si hay cambios en módulos, el step 4 ya exige que se actualice)
          MODIFIES_MODULES=false
          if echo "$CHANGED" | grep -qE '^(agentes|skills|commands|hooks|mcp|plugins|dot-claude|repositorios|validadores|modulo|proyecto|miniapps|autoresearch|cuadernos|knowledge|\.github)/'; then
            MODIFIES_MODULES=true
          fi

          if echo "$CHANGED" | grep -qx "CHANGELOG.md" && [ "$MODIFIES_MODULES" = false ]; then
            echo "⚠️ Archivo protegido modificado: CHANGELOG.md (sin cambios en módulos)"
            EXIT=1
          fi

          for f in "${PROTECTED[@]}"; do
            if echo "$CHANGED" | grep -qx "$f"; then
              echo "⚠️ Archivo protegido modificado: $f"
              EXIT=1
            fi
          done

          if [ $EXIT -eq 1 ]; then
            echo ""
            echo "Estos archivos definen el contrato del sistema de plantillas."
            echo "Si necesitas modificarlos, abre un issue primero y discútelo."
            exit 1
          fi
          echo "::endgroup::"

      # ── 4. CHANGELOG Actualizado ────────────────────────────────────────
      - name: Verificar CHANGELOG.md
        run: |
          echo "::group::Verificación CHANGELOG"
          CHANGES=$(git diff --name-only "$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" "${{ github.event.pull_request.head.sha }}")" \
            "${{ github.event.pull_request.head.sha }}")

          if echo "$CHANGES" | grep -qE '^(agentes|skills|commands|hooks|mcp|plugins|dot-claude|repositorios|validadores|modulo|proyecto|miniapps|autoresearch|cuadernos|knowledge|\.github)/'; then
            if echo "$CHANGES" | grep -qx "CHANGELOG.md"; then
              echo "✅ CHANGELOG.md actualizado"
            else
              echo "❌ Falta actualizar CHANGELOG.md"
              echo "Este PR modifica módulos o validadores. Añade una entrada en CHANGELOG.md."
              exit 1
            fi
          else
            echo "ℹ️ No requiere CHANGELOG (no modifica módulos)"
          fi
          echo "::endgroup::"

      # ── 5. Placeholders en Ejemplos ─────────────────────────────────────
      - name: Validar que ejemplos no tengan placeholders
        run: |
          echo "::group::Verificación de placeholders"
          EXIT=0
          CHECKS=(
            "mcp|mcp/validar_mcp.py|mcp/ejemplo_mcp"
            "plugins|plugins/validar_plugin.py|plugins/ejemplo_plugin"
            "skills|skills/validar_skill.py|skills/ejemplo_skill"
            "dot-claude|dot-claude/validar_dot_claude.py|dot-claude/ejemplo_dot_claude"
          )
          for entry in "${CHECKS[@]}"; do
            IFS='|' read -r MOD SCRIPT EJEMPLO <<< "$entry"
            if [ -e "$EJEMPLO" ] && [ -f "$SCRIPT" ]; then
              python "$SCRIPT" "$EJEMPLO" --strict || EXIT=1
            fi
          done
          echo "::endgroup::"
          exit $EXIT

      - name: Reportar estado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATE="success"
          if [ "${{ job.status }}" != "success" ]; then STATE="failure"; fi
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context="Guardián de PRs" \
            -f description="título + tamaño + protegidos + changelog + placeholders"
