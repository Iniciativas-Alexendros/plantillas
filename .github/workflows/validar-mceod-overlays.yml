# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación del módulo mceod-overlays/
#
# Propósito: Ejecuta validar_mceod_overlays.py --strict sobre el módulo
#            mceod-overlays/ cuando hay cambios en ese subárbol o en el
#            propio validador / workflow.
#
# Se ejecuta en:
#   - Pull Request que toque mceod-overlays/** o este workflow
#   - Push a main/master con los mismos paths
#   - Manualmente (workflow_dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar mceod-overlays

on:
  pull_request:
    paths:
      - "mceod-overlays/**"
      - ".github/workflows/validar-mceod-overlays.yml"
      - "validadores/**"
  push:
    branches: [main, master]
    paths:
      - "mceod-overlays/**"
      - ".github/workflows/validar-mceod-overlays.yml"
      - "validadores/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validar:
    name: Validar mceod-overlays
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar mceod-overlays (strict)
        run: |
          set -o pipefail
          python mceod-overlays/validar_mceod_overlays.py --strict
