# ═══════════════════════════════════════════════════════════════════════════════
# post-merge · dogfood en plantillas mismo
#
# Apunta a @main (no @v1 todavía · tagueo v1.0.0 tras semana de validación).
# Este caller valida la lib en su propio repo antes de extender a otros pilotos.
# ═══════════════════════════════════════════════════════════════════════════════

name: post-merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # sticky-commit-comment + release-please commits
  issues: write # sticky-issue (anti-flake regression tracking)
  pull-requests: write # release-please PR creation (solo si enable_release=true)
  id-token: write # OIDC para actions/attest-build-provenance
  attestations: write # SLSA L3 attestations
  checks: write # reviewdog reporter github-check
  security-events: write # zizmor SARIF upload

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: Iniciativas-Alexendros/plantillas/.github/workflows/_lib-post-merge.yml@e260a4500e76d74a5e9ca04b4794a54e9b5affac # pinned SHA (main)
    with:
      enable_linters: true
      enable_sbom: true
      enable_attest: true
      enable_release: false # plantillas: aún no activamos release-please hasta validar
      streak_threshold_open: 2
      streak_threshold_close: 3
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
