# ═══════════════════════════════════════════════════════════════════════════════
# Security Scan · Detección de Secrets y Archivos Prohibidos
#
# Propósito: Evitar que secrets, tokens, claves privadas o archivos personales
# lleguen al historial del repositorio, incluso si alguien fuerza `git add -f`.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main
#   - Manualmente (workflow_dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

name: Security Scan

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  security:
    name: Security
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      # ── 1. Detect Secrets (regex) ──────────────────────────────────────
      - name: Scan de secrets con regex
        run: |
          echo "::group::Detect Secrets"
          python3 << 'PYEOF'
          import re
          from pathlib import Path

          PATRONES = [
              re.compile(r"gh[pousr]_[A-Za-z0-9_]{36,}"),
              re.compile(r"sk-[a-zA-Z0-9]{20,}"),
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"[0-9a-f]{32}-[0-9a-f]{32}"),
              re.compile(r"private[_-]?key\s*[:=]\s*['\"]?[\w/+]{20,}"),
              re.compile(r"api[_-]?key\s*[:=]\s*['\"]?[\w/+]{20,}", re.IGNORECASE),
              re.compile(r"password\s*[:=]\s*['\"]?[^\s'\"]{8,}", re.IGNORECASE),
              re.compile(r"token\s*[:=]\s*['\"]?[\w-]{20,}", re.IGNORECASE),
          ]

          BASE = Path(".")
          errores = 0
          for p in BASE.rglob("*"):
              if not p.is_file():
                  continue
              if ".git" in p.parts:
                  continue
              if p.stat().st_size > 2 * 1024 * 1024:
                  continue
              try:
                  text = p.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              for pat in PATRONES:
                  m = pat.search(text)
                  if m:
                      print(f"::error file={p}::Posible secret detectado: {m.group()[:30]}...")
                      errores += 1
                      break
          exit(errores if errores > 0 else 0)
          PYEOF
          echo "::endgroup::"

      # ── 2. .gitignore violations ───────────────────────────────────────
      - name: Detectar archivos que deberían estar ignorados
        run: |
          echo "::group::Gitignore Check"
          EXIT=0

          CHECKS=(
            ".env"
            ".env.local"
            "*.pem"
            "*.key"
            "id_rsa"
            "secrets"
          )

          for pattern in "${CHECKS[@]}"; do
            if [ "${pattern:0:1}" = "*" ]; then
              ext="${pattern:1}"
              matches=$(find . -type f -name "*${ext}" ! -path './.git/*' | head -20)
            else
              matches=$(find . -type f -name "${pattern}" ! -path './.git/*' | head -20)
            fi

            if [ -n "$matches" ]; then
              echo "❌ Archivos que violan .gitignore:"
              echo "$matches"
              EXIT=1
            fi
          done

          for dir in cuaderno-plantilla artefactos/operador vap; do
            if [ -d "$dir" ]; then
              echo "⚠️ Directorio prohibido detectado en el repo: $dir/"
              EXIT=1
            fi
          done

          echo "::endgroup::"
          exit $EXIT

      # ── 3. TruffleHog (scan de filesystem) ────────────────────────────
      # Sin `base`/`head`: TruffleHog escanea el árbol de trabajo completo en
      # vez de un diff git. Evita el error "BASE and HEAD commits are the same"
      # que rompía este job en cada push/merge a main (donde default_branch ==
      # HEAD). Cubre PR, push y workflow_dispatch por igual.
      - name: Ejecutar TruffleHog
        uses: trufflesecurity/trufflehog@092db2aa9d836cdc0bb2c9fcc93435d026e14d0c # main
        with:
          path: ./
          extra_args: --only-verified

      - name: Reportar estado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          STATE="success"
          if [ "$JOB_STATUS" != "success" ]; then STATE="failure"; fi
          SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context="Security Scan" \
            -f description="detect-secrets + gitignore + TruffleHog"
