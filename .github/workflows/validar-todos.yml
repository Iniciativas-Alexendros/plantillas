# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación completa del sistema de plantillas
#
# Propósito: Valida TODOS los ejemplos de TODOS los módulos en cada cambio.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main/master
#   - Manualmente (workflow_dispatch)
#
# Módulos validados (12 canónicos):
#   - Single-file canon: agentes, commands, miniapps
#   - Dir canon: agent-config, repositorios, modulo, proyecto, skills, mcp,
#               plugins
#   - Sh-template canon: hooks
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Sistema de Plantillas

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validar:
    name: Validar Módulos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pyyaml

      - name: Validar estructura del repo
        run: |
          echo "::group::validar_repo.py"
          python validar_repo.py --strict
          echo "::endgroup::"

      - name: Validar todos los módulos
        run: |
          GLOBAL_EXIT=0
          PASSED=0
          FAILED=0

          # Declarar módulos: nombre|script|ejemplo|plantilla
          # plantilla vacía = no validar plantilla
          MODULES=(
            "agentes|agentes/validar_agente.py|agentes/ejemplo_agente.md|agentes/plantilla_agente.md"
            "commands|commands/validar_command.py|commands/ejemplo_command.md|commands/plantilla_command.md"
            "miniapps|miniapps/validar_miniapps.py|miniapps/ejemplo_miniapps.md|miniapps/plantilla_miniapps.md"
            "hooks|hooks/validar_hook.py|hooks/ejemplo_hook.sh.template|hooks/plantilla_hook.sh.template"
            "agent-config|agent-config/validar_agent_config.py|agent-config|"
            "skills|skills/validar_skill.py|skills/ejemplo_skill|skills/plantilla_skill"
            "mcp|mcp/validar_mcp.py|mcp/ejemplo_mcp|mcp/plantilla_mcp"
            "plugins|plugins/validar_plugin.py|plugins/ejemplo_plugin|plugins/plantilla_plugin"
            "repositorios|repositorios/validar_repositorio.py|repositorios/ejemplo_repositorio|repositorios/plantilla_repositorio"
            "modulo|modulo/validar_modulo.py|modulo|"
            "proyecto|proyecto/validar_proyecto.py|proyecto|"
            "estandares|estandares/validar_estandares.py|estandares|"
          )

          for entry in "${MODULES[@]}"; do
            IFS='|' read -r MOD SCRIPT EJEMPLO PLANTILLA <<< "$entry"

            echo "::group::📦 $MOD"
            MOD_OK=true

            if python "$SCRIPT" "$EJEMPLO" --strict; then
              echo "✅ ejemplo: OK"
            else
              echo "❌ ejemplo: FALLÓ"
              MOD_OK=false
              GLOBAL_EXIT=1
            fi

            if [ -n "$PLANTILLA" ] && [ -e "$PLANTILLA" ]; then
              python "$SCRIPT" "$PLANTILLA" || true
            fi

            echo "::endgroup::"

            if [ "$MOD_OK" = true ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 Resultado: $PASSED pasaron, $FAILED fallaron"
          echo "═══════════════════════════════════════"
          exit $GLOBAL_EXIT

      - name: Reportar estado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          STATE="success"
          if [ "$JOB_STATUS" != "success" ]; then STATE="failure"; fi
          SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context="Validar Sistema de Plantillas" \
            -f description="12 módulos canónicos"
