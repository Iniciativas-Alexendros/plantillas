# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación completa del sistema de plantillas
#
# Propósito: Valida TODOS los ejemplos de TODOS los módulos en cada cambio.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main/master
#   - Manualmente (workflow_dispatch)
#
# Módulos validados: agentes, skills, commands, hooks, mcp, plugins, dot-claude,
#                    repositorios, modulo, proyecto
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Sistema de Plantillas

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validar:
    name: Validar Módulos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pyyaml

      - name: Validar todos los módulos
        run: |
          # Mapa de módulo → singular (para rutas de validador/ejemplo)
          singular() {
            case "$1" in
              agentes)      echo "agente" ;;
              skills)       echo "skill" ;;
              commands)     echo "command" ;;
              hooks)        echo "hook" ;;
              mcp)          echo "mcp" ;;
              plugins)      echo "plugin" ;;
              dot-claude)   echo "dot_claude" ;;
              repositorios) echo "repositorio" ;;
              modulo)       echo "modulo" ;;
              proyecto)     echo "proyecto" ;;
              *)            echo "$1" ;;
            esac
          }

          MODULOS=(agentes skills commands hooks mcp plugins dot-claude repositorios modulo proyecto)
          ESPECIALES=(modulo proyecto)
          GLOBAL_EXIT=0
          PASSED=0
          FAILED=0

          for dir in "${MODULOS[@]}"; do
            S=$(singular "$dir")
            SCRIPT_PY="${dir}/validar_${S}.py"

            if [ ! -f "$SCRIPT_PY" ]; then
              echo "⚠️ Sin validador para $dir — omitido"
              continue
            fi

            echo "::group::📦 $dir"
            MOD_OK=true

            # Ejemplo path
            if [[ " ${ESPECIALES[*]} " == *" $dir "* ]]; then
              EJEMPLO="$dir"
            else
              EJEMPLO="${dir}/ejemplo_${S}"
            fi

            EXTRA_ARGS=""
            if [ "$dir" = "repositorios" ]; then
              EXTRA_ARGS="--visibility public"
            fi

            if python "$SCRIPT_PY" "$EJEMPLO" --strict $EXTRA_ARGS; then
              echo "✅ ejemplo: OK"
            else
              echo "❌ ejemplo: FALLÓ"
              MOD_OK=false
              GLOBAL_EXIT=1
            fi

            # Plantilla path
            if [[ " ${ESPECIALES[*]} " == *" $dir "* ]]; then
              PLANTILLA="$dir"
            else
              PLANTILLA="${dir}/plantilla_${S}"
            fi

            if [ -d "$PLANTILLA" ]; then
              if [[ " ${ESPECIALES[*]} " == *" $dir "* ]]; then
                python "$SCRIPT_PY" "$PLANTILLA" || true
              else
                python "$SCRIPT_PY" "$PLANTILLA" --strict || true
              fi
            fi

            echo "::endgroup::"

            if [ "$MOD_OK" = true ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 Resultado: $PASSED pasaron, $FAILED fallaron"
          echo "═══════════════════════════════════════"
          exit $GLOBAL_EXIT
