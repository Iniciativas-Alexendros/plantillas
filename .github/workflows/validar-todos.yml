# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD · Validación completa del sistema de plantillas
#
# Propósito: Valida TODOS los ejemplos de TODOS los módulos en cada cambio.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main/master
#   - Manualmente (workflow_dispatch)
#
# Módulos validados: agentes, skills, commands, hooks, mcp, plugins, dot-claude,
#                    repositorios, modulo, proyecto
# ═══════════════════════════════════════════════════════════════════════════════

name: Validar Sistema de Plantillas

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  listar-modulos:
    name: Listar módulos
    runs-on: ubuntu-latest
    outputs:
      modulos: ${{ steps.list.outputs.modulos }}
    steps:
      - uses: actions/checkout@v4

      - name: Detectar módulos con validador
        id: list
        run: |
          source .github/scripts/module-map.sh
          FOUND=()
          for dir in "${MODULOS_CANONICOS[@]}"; do
            script=$(module_validator "$dir")
            if [ -f "$script" ]; then
              FOUND+=("$dir")
            fi
          done

          if [ ${#FOUND[@]} -eq 0 ]; then
            FOUND=("${MODULOS_CANONICOS[@]}")
          fi

          JSON=$(printf '%s\n' "${FOUND[@]}" | jq -R . | jq -s .)
          echo "modulos=$JSON" >> "$GITHUB_OUTPUT"
          echo "📦 Módulos detectados:"
          printf '%s\n' "${FOUND[@]}"

  validar:
    name: Validar ${{ matrix.modulo }}
    runs-on: ubuntu-latest
    needs: listar-modulos
    strategy:
      fail-fast: false
      matrix:
        modulo: ${{ fromJson(needs.listar-modulos.outputs.modulos) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-validadores

      - name: Ejecutar validador de ${{ matrix.modulo }}
        run: |
          source .github/scripts/module-map.sh
          SCRIPT_PY=$(module_validator "${{ matrix.modulo }}")
          EJEMPLO=$(module_ejemplo "${{ matrix.modulo }}")

          EXTRA_ARGS=""
          if [ "${{ matrix.modulo }}" = "repositorios" ]; then
            EXTRA_ARGS="--visibility public"
          fi

          echo "::group::Validando ejemplo $EJEMPLO con $SCRIPT_PY"
          python "$SCRIPT_PY" "$EJEMPLO" --strict $EXTRA_ARGS
          echo "::endgroup::"

      - name: Validar plantilla correspondiente
        run: |
          source .github/scripts/module-map.sh
          SCRIPT_PY=$(module_validator "${{ matrix.modulo }}")
          PLANTILLA=$(module_plantilla "${{ matrix.modulo }}")

          if [ -d "$PLANTILLA" ]; then
            echo "::group::Validando plantilla $PLANTILLA"
            if module_is_special "${{ matrix.modulo }}"; then
              python "$SCRIPT_PY" "$PLANTILLA" || true
            else
              python "$SCRIPT_PY" "$PLANTILLA" || true
            fi
            echo "::endgroup::"
          fi

  resumen:
    name: Resumen
    runs-on: ubuntu-latest
    needs: validar
    if: always()
    steps:
      - name: Resultado final
        run: |
          if [ "${{ needs.validar.result }}" == "success" ]; then
            echo "✅ TODOS LOS MÓDULOS PASARON LA VALIDACIÓN"
            exit 0
          else
            echo "❌ ALGUNOS MÓDULOS FALLARON LA VALIDACIÓN"
            exit 1
          fi
