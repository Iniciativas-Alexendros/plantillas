# ═══════════════════════════════════════════════════════════════════════════════
# _lib-release-please · Reusable workflow
#
# Propósito: wrapper de googleapis/release-please-action@v4 con autotype.
# Detecta el tipo de release a usar (manifest|node|rust|python|simple) según
# detect-stack outputs o input explícito. Sin config en el consumidor (modo
# por defecto). Si existe release-please-config.json + manifest, los respeta.
#
# Allowlist: el orchestrator solo invoca este lib si `enable_release=true`.
# Repos sin necesidad (controlink-operator, xek-cluster) jamás disparan.
# ═══════════════════════════════════════════════════════════════════════════════

name: _lib · release-please

on:
  workflow_call:
    inputs:
      release_type:
        description: "node|rust|python|simple|manifest. Si vacío, autodetect via input release_type_auto."
        type: string
        required: false
        default: ""
      release_type_auto:
        description: Salida de detect-stack.release_type.
        type: string
        required: false
        default: simple
      target_branch:
        type: string
        required: false
        default: main
    outputs:
      release_created:
        value: ${{ jobs.run.outputs.release_created }}
      release_tag:
        value: ${{ jobs.run.outputs.release_tag }}

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      release_tag: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: decide
        name: Decidir release-type efectivo
        env:
          OVERRIDE: ${{ inputs.release_type }}
          AUTO: ${{ inputs.release_type_auto }}
        run: |
          set -Eeuo pipefail
          T="${OVERRIDE:-$AUTO}"
          # Si el caller tiene release-please-config.json, forzar manifest.
          if [ -f release-please-config.json ] && [ -f .release-please-manifest.json ]; then
            T=manifest
          fi
          echo "type=$T" >> "$GITHUB_OUTPUT"
          echo "::notice::release-please type=$T (override='${OVERRIDE}' auto='${AUTO}')"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - id: rp
        name: googleapis/release-please-action
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ github.token }}
          release-type: ${{ steps.decide.outputs.type }}
          target-branch: ${{ inputs.target_branch }}

      - name: Summary release-please
        if: always()
        env:
          RP_TYPE: ${{ steps.decide.outputs.type }}
          RP_RELEASE_CREATED: ${{ steps.rp.outputs.release_created || 'false' }}
          RP_TAG_NAME: ${{ steps.rp.outputs.tag_name || 'n/a' }}
        run: |
          {
            echo "### release-please"
            echo "**Release type:** \`$RP_TYPE\`"
            echo "**release_created:** \`$RP_RELEASE_CREATED\`"
            echo "**tag_name:** \`$RP_TAG_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"
