# ═══════════════════════════════════════════════════════════════════════════════
# CI Global · Lint, Formato y Protección de Estructura
#
# Propósito: Garantizar que todo código que entra al repo cumple con las reglas
# de formato (YAML, JSON, Markdown, Python, Shell) y mantiene la estructura
# canónica definida en validar_repo.py.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main
#   - Manualmente (workflow_dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI Global

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar yamllint
        run: pip install yamllint
      - name: Ejecutar yamllint
        run: |
          yamllint -d relaxed \
            $(find . -type f \( -name '*.yml' -o -name '*.yaml' \) \
              ! -path './.git/*' \
              ! -path './artefactos/*' | sort)

  lint-json:
    name: Lint JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar JSON
        run: |
          EXIT=0
          for f in $(find . -type f -name '*.json' ! -path './.git/*' | sort); do
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ JSON inválido: $f"
              EXIT=1
            fi
          done
          exit $EXIT

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar markdownlint
        run: npm install -g markdownlint-cli
      - name: Ejecutar markdownlint
        run: |
          markdownlint \
            --ignore '.git/**' \
            --ignore 'artefactos/**' \
            --ignore '**/node_modules/**' \
            --ignore 'dot-claude/**' \
            '**/*.md' || true  # Warnings por ahora, no bloqueantes

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar ruff
        run: pip install ruff
      - name: Ejecutar ruff
        run: ruff check validadores/ tests/ */validar_*.py validar_repo.py

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Ejecutar shellcheck
        run: |
          find . -type f \( -name '*.sh' -o -name 'claude-init' -o -name 'install' -o -name 'update' \) \
            ! -path './.git/*' \
            ! -path './artefactos/*' | while read -r f; do
            # Solo si el shebang es bash/sh
            if head -1 "$f" | grep -qE 'bash|sh'; then
              echo "🔍 $f"
              shellcheck -S warning "$f" || true
            fi
          done

  lint-repo-structure:
    name: Validar Estructura del Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ejecutar validador global
        run: python validar_repo.py --strict

  resumen:
    name: Resumen CI Global
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-json, lint-markdown, lint-python, lint-shell, lint-repo-structure]
    if: always()
    steps:
      - name: Resultado final
        run: |
          for job in lint-yaml lint-json lint-markdown lint-python lint-shell lint-repo-structure; do
            result="${{ needs[job].result }}"
            if [ "$result" == "success" ]; then
              echo "✅ $job"
            else
              echo "❌ $job ($result)"
            fi
          done

          if [ "${{ needs.lint-yaml.result }}" == "success" ] && \
             [ "${{ needs.lint-json.result }}" == "success" ] && \
             [ "${{ needs.lint-python.result }}" == "success" ] && \
             [ "${{ needs.lint-repo-structure.result }}" == "success" ]; then
            echo "✅ CI GLOBAL PASÓ"
            exit 0
          else
            echo "❌ CI GLOBAL FALLÓ"
            exit 1
          fi
