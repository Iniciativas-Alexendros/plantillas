# ═══════════════════════════════════════════════════════════════════════════════
# CI Global · Lint, Formato y Estructura
#
# Propósito: Garantizar que todo código que entra al repo cumple con las reglas
# de formato (YAML, JSON, Markdown, Python, Shell) y mantiene la estructura
# canónica definida en validar_repo.py.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main
#   - Manualmente (workflow_dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI Global

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint & Estructura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Instalar herramientas
        run: |
          pip install yamllint==0.33.0 ruff==0.11.0 pyyaml==6.0.2
          npm install -g markdownlint-cli@0.44.0
          # shellcheck v0.10.0 binario estático (evita apt + versiones flotantes)
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz | \
            tar -xJf - -C /tmp
          install -m755 /tmp/shellcheck-v0.10.0/shellcheck "$HOME/.local/bin/shellcheck"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── Bloqueantes ──────────────────────────────────────────────────────
      - name: Lint YAML
        run: |
          echo "::group::yamllint"
          yamllint --no-warnings -d relaxed \
            $(find . -type f \( -name '*.yml' -o -name '*.yaml' \) \
              ! -path './.git/*' \
              ! -path './artefactos/*' | sort)
          echo "::endgroup::"

      - name: Lint JSON
        run: |
          echo "::group::json validation"
          EXIT=0
          for f in $(find . -type f -name '*.json' ! -path './.git/*' | sort); do
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ JSON inválido: $f"
              EXIT=1
            fi
          done
          echo "::endgroup::"
          exit $EXIT

      - name: Lint Python
        run: |
          echo "::group::ruff"
          ruff check validadores/ tests/ */validar_*.py validar_repo.py
          echo "::endgroup::"

      - name: Validar Estructura del Repo
        run: |
          echo "::group::validar_repo.py"
          python validar_repo.py --strict
          echo "::endgroup::"

      # ── Advisory (no bloquean el PR) ─────────────────────────────────────
      - name: Lint Shell (advisory)
        if: always()
        run: |
          echo "::group::shellcheck"
          find . -type f \( -name '*.sh' -o -name 'claude-init' -o -name 'install' -o -name 'update' \) \
            ! -path './.git/*' \
            ! -path './artefactos/*' | while read -r f; do
            if head -1 "$f" | grep -qE 'bash|sh'; then
              echo "🔍 $f"
              shellcheck -S warning "$f" || true
            fi
          done
          echo "::endgroup::"

      - name: Lint Markdown (advisory)
        if: always()
        run: |
          echo "::group::markdownlint"
          markdownlint \
            --ignore '.git/**' \
            --ignore 'artefactos/**' \
            --ignore '**/node_modules/**' \
            --ignore 'dot-claude/**' \
            '**/*.md' || true
          echo "::endgroup::"

      - name: Reportar estado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          STATE="success"
          if [ "$JOB_STATUS" != "success" ]; then STATE="failure"; fi
          SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context="CI Global" \
            -f description="Lint & Estructura"
