# ═══════════════════════════════════════════════════════════════════════════════
# CI Global · Lint, Formato y Protección de Estructura
#
# Propósito: Garantizar que todo código que entra al repo cumple con las reglas
# de formato (YAML, JSON, Markdown, Python, Shell) y mantiene la estructura
# canónica definida en validar_repo.py.
#
# Se ejecuta en:
#   - Cada Pull Request
#   - Push a main
#   - Manualmente (workflow_dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI Global

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar yamllint
        run: pip install yamllint
      - name: Ejecutar yamllint
        run: |
          yamllint -d relaxed \
            $(find . -type f \( -name '*.yml' -o -name '*.yaml' \) \
              ! -path './.git/*' \
              ! -path './artefactos/*' \
              ! -name '.pre-commit-config.yaml' | sort)

  lint-json:
    name: Lint JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar JSON
        run: |
          EXIT=0
          for f in $(find . -type f -name '*.json' ! -path './.git/*' | sort); do
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ JSON inválido: $f"
              EXIT=1
            fi
          done
          exit $EXIT

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar markdownlint
        run: npm install -g markdownlint-cli
      - name: Ejecutar markdownlint
        run: |
          markdownlint \
            --ignore '.git/**' \
            --ignore 'artefactos/**' \
            --ignore '**/node_modules/**' \
            --ignore 'dot-claude/**' \
            '**/*.md'

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar ruff
        run: pip install ruff
      - name: Ejecutar ruff
        run: ruff check validadores/ tests/ */validar_*.py validar_repo.py

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Instalar shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Ejecutar shellcheck
        run: |
          EXIT=0
          while read -r f; do
            if head -1 "$f" | grep -qE 'bash|sh'; then
              echo "🔍 $f"
              shellcheck -S warning "$f" || EXIT=1
            fi
          done < <(find . -type f \( -name '*.sh' -o -name 'claude-init' \) \
            ! -path './.git/*' \
            ! -path './artefactos/*')
          exit $EXIT

  lint-repo-structure:
    name: Validar Estructura del Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ejecutar validador global
        run: python validar_repo.py --strict

  resumen:
    name: Resumen CI Global
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-json, lint-markdown, lint-python, lint-shell, lint-repo-structure]
    if: always()
    steps:
      - name: Resultado final
        env:
          R_YAML: ${{ needs.lint-yaml.result }}
          R_JSON: ${{ needs.lint-json.result }}
          R_MD: ${{ needs.lint-markdown.result }}
          R_PY: ${{ needs.lint-python.result }}
          R_SH: ${{ needs.lint-shell.result }}
          R_REPO: ${{ needs.lint-repo-structure.result }}
        run: |
          icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          echo "$(icon "$R_YAML") lint-yaml: $R_YAML"
          echo "$(icon "$R_JSON") lint-json: $R_JSON"
          echo "$(icon "$R_MD") lint-markdown: $R_MD (advisory)"
          echo "$(icon "$R_PY") lint-python: $R_PY"
          echo "$(icon "$R_SH") lint-shell: $R_SH (advisory)"
          echo "$(icon "$R_REPO") lint-repo-structure: $R_REPO"

          # Bloqueantes: yaml, json, python, repo-structure
          # Advisories: markdown, shell (continue-on-error)
          if [ "$R_YAML" = "success" ] && \
             [ "$R_JSON" = "success" ] && \
             [ "$R_PY" = "success" ] && \
             [ "$R_REPO" = "success" ]; then
            echo ""
            echo "✅ CI GLOBAL PASÓ"
            exit 0
          else
            echo ""
            echo "❌ CI GLOBAL FALLÓ"
            exit 1
          fi
